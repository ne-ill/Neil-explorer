<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
text-align:center;
}

.header{
background:#111;
padding:15px;
font-size:20px;
}

.chatbox{
width:90%;
max-width:400px;
margin:20px auto;
background:#151515;
border-radius:10px;
padding:10px;
height:300px;
overflow:auto;
}

.message{
margin:8px 0;
}

.user{
color:#4CAF50;
}

.ai{
color:#00BCD4;
}

input{
width:70%;
padding:8px;
border-radius:6px;
border:none;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#222;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
🤖 AI Assistant
</div>

<div class="chatbox" id="chat"></div>

<input id="input" placeholder="Ask something...">
<button onclick="send()">Send</button>

<div style="margin-top:15px;">
<button onclick="goHome()">⬅ Back</button>
</div>

<script>

function goHome(){
window.location.href="Explore.html"
}

function send(){

let input=document.getElementById("input").value

if(!input) return

let chat=document.getElementById("chat")

chat.innerHTML += "<div class='message user'>You: "+input+"</div>"

let reply=""

if(input.toLowerCase().includes("hello")){
reply="Hello Shyam 👋"
}

else if(input.toLowerCase().includes("space")){
reply="Space Explorer tracks satellites and rockets 🚀"
}

else if(input.toLowerCase().includes("earth")){
reply="Earth Explorer monitors earthquakes and weather 🌎"
}

else if(input.toLowerCase().includes("signal")){
reply="Signal Explorer scans communication networks 📡"
}

else{
reply="I am your Neill Studio assistant 🤖"
}

chat.innerHTML += "<div class='message ai'>AI: "+reply+"</div>"

document.getElementById("input").value=""

chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>
